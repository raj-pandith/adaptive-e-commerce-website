spring.application.name=ecom-backend

# Database
spring.datasource.url=jdbc:mysql://localhost:5432/adaptive_ecom
spring.datasource.username=ecom_user
spring.datasource.password=ecom_pass123
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080
server.servlet.context-path=/api

# JWT
jwt.secret=yourSuperSecretKeyChangeThisInProduction1234567890
jwt.expiration=86400000